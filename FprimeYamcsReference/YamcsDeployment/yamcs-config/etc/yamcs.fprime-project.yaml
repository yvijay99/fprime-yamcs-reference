services:
  - class: org.yamcs.archive.XtceTmRecorder
  - class: org.yamcs.archive.ParameterRecorder
  - class: org.yamcs.archive.AlarmRecorder
  - class: org.yamcs.archive.EventRecorder
  - class: org.yamcs.archive.ReplayServer
  - class: org.yamcs.parameter.SystemParametersService
    args:
      producers:
        - fs
        - jvm
  - class: org.yamcs.ProcessorCreatorService
    args:
      name: realtime
      type: realtime
  - class: org.yamcs.archive.CommandHistoryRecorder
  - class: org.yamcs.parameterarchive.ParameterArchive
    args:
      realtimeFiller:
        enabled: true
  - class: org.yamcs.plists.ParameterListService
  - class: org.yamcs.timeline.TimelineService
  - class: org.yamcs.ProcessRunner
    args:
      command: ["fprime-yamcs-events"]
      restart: "always"
      logLevel: INFO

  # Bridge service: reformats CFDP packets from tm_realtime to cfdp_in
  # This is needed because tm_realtime tuples have a "packet" column but
  # CfdpService expects a "pdu" column
  - class: com.example.myproject.CfdpBridgeService
    args:
      inStream: tm_realtime
      outStream: cfdp_in
      fileApid: 3

  # Uplink bridge: sends CFDP PDUs from cfdp_out to spacecraft via TC link
  - class: com.example.myproject.CfdpUplinkBridge
    args:
      inStream: cfdp_out
      uplinkLink: UDP_TC_OUT.vc1
      fileApid: 3

  # CFDP Service - F Prime CFDP file transfer
  # Entity IDs from lib/fprime/Svc/Ccsds/CfdpManager/Parameters.fppi
  # F´ LocalEid=42, FileInDefaultDestEntityId=100
  # So YAMCS must be entity 100, F´ is entity 42
  - class: org.yamcs.cfdp.CfdpService
    name: FprimeFilePacketService
    args:
      inStream: cfdp_in
      outStream: cfdp_out

      # YAMCS entity ID (matches F´'s FileInDefaultDestEntityId)
      localEntities:
        - name: yamcs
          id: 100
          bucket: fprimeFilesIn
      # F´ entity ID (matches F´'s LocalEid)
      remoteEntities:
        - name: fprime
          id: 42

      # EntityId=U32, TransactionSeq=U32, MaxPduSize
      # Frame size is 1024, TC frame overhead ~7 bytes, CCSDS header 6 bytes, ComPacket descriptor 2 bytes
      # Available: 1024 - 7 - 6 - 2 = 1009 bytes
      # Use 992 to match F´'s OutgoingFileChunkSize parameter
      entityIdLength: 4
      sequenceNrLength: 4
      maxPduSize: 992

      # ChannelConfig timing parameters (Parameters.fppi)
      eofAckTimeout: 10000
      eofAckLimit: 10
      finAckTimeout: 10000
      finAckLimit: 10
      nakLimit: 10
      inactivityTimeout: 120000
      immediateNak: true

      # Fault handlers
      senderFaultHandlers:
        AckLimitReached: suspend
        NakLimitReached: suspend
        InactivityDetected: suspend
      receiverFaultHandlers:
        AckLimitReached: suspend
        NakLimitReached: suspend
        InactivityDetected: suspend

dataLinks:
  - name: UDP_TM_IN
    class: org.yamcs.tctm.ccsds.UdpTmFrameLink
    port: 50000
    frameType: "TM"
    spacecraftId: 68
    frameLength: 1024
    errorDetection: CRC16
    virtualChannels:
      - vcId: 1
        ocfPresent: false
        service: "PACKET"
        maxPacketLength: 1024
        packetPreprocessorClassName: com.example.myproject.FprimePacketPreprocessor
        stream: "tm_realtime"

  - name: UDP_TC_OUT
    class: org.yamcs.tctm.ccsds.UdpTcFrameLink
    host: localhost
    port: 50001
    spacecraftId: 68
    maxFrameLength: 1024
    errorDetection: CRC16
    virtualChannels:
      - vcId: 1
        ocfPresent: false
        service: "PACKET"
        priority: 1
        commandPostprocessorClassName: com.example.myproject.FprimeCommandPostprocessor
        stream: "tc_realtime"
        useCop1: false

mdb:
  # Configuration of the active loaders
  # Valid loaders are: sheet, xtce or fully qualified name of the class
  - type: xtce
    args:
      file: mdb/fprime.xtce.xml

# Configuration for streams created at server startup
streamConfig:
  tm:
    - name: "tm_realtime"
      processor: "realtime"
    - name: "tm_dump"
    - name: "cfdp_in"
      schema:
        columns:
          - name: "gentime"
            type: "TIMESTAMP"
          - name: "seqNum"
            type: "INT"
          - name: "rectime"
            type: "TIMESTAMP"
          - name: "pdu"
            type: "BINARY"
  cmdHist: ["cmdhist_realtime", "cmdhist_dump"]
  event: ["events_realtime", "events_dump"]
  param: ["pp_realtime", "pp_dump", "sys_param", "proc_param"]
  parameterAlarm: ["alarms_realtime"]
  tc:
    - name: "tc_realtime"
      processor: "realtime"
    - name: "cfdp_out"
      schema:
        columns:
          - name: "gentime"
            type: "TIMESTAMP"
          - name: "seqNum"
            type: "INT"
          - name: "pdu"
            type: "BINARY"
