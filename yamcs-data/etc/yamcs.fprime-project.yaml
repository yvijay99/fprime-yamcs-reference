dataLinks:
- class: org.yamcs.tctm.ccsds.UdpTmFrameLink
  errorDetection: CRC16
  frameLength: 1024
  frameType: TM
  name: UDP_TM_IN
  port: 50000
  spacecraftId: 68
  virtualChannels:
  - maxPacketLength: 1024
    ocfPresent: false
    packetPreprocessorClassName: com.example.myproject.MyPacketPreprocessor
    service: PACKET
    stream: tm_realtime
    vcId: 1
- class: org.yamcs.tctm.ccsds.UdpTcFrameLink
  errorDetection: CRC16
  host: localhost
  maxFrameLength: 1024
  name: UDP_TC_OUT
  port: 50001
  spacecraftId: 68
  virtualChannels:
  - commandPostprocessorClassName: com.example.myproject.MyCommandPostprocessor
    ocfPresent: false
    priority: 1
    service: PACKET
    stream: tc_realtime
    useCop1: false
    vcId: 1
mdb:
- args:
    file: mdb/fprime.xtce.xml
  type: xtce
services:
- class: org.yamcs.archive.XtceTmRecorder
- class: org.yamcs.archive.ParameterRecorder
- class: org.yamcs.archive.AlarmRecorder
- class: org.yamcs.archive.EventRecorder
- class: org.yamcs.archive.ReplayServer
- args:
    producers:
    - fs
    - jvm
  class: org.yamcs.parameter.SystemParametersService
- args:
    name: realtime
    type: realtime
  class: org.yamcs.ProcessorCreatorService
- class: org.yamcs.archive.CommandHistoryRecorder
- args:
    realtimeFiller:
      enabled: true
  class: org.yamcs.parameterarchive.ParameterArchive
- class: org.yamcs.plists.ParameterListService
- class: org.yamcs.timeline.TimelineService
- args:
    command:
    - fprime-yamcs-events
    logLevel: INFO
    restart: always
  class: org.yamcs.ProcessRunner
streamConfig:
  cmdHist:
  - cmdhist_realtime
  - cmdhist_dump
  event:
  - events_realtime
  - events_dump
  param:
  - pp_realtime
  - pp_dump
  - sys_param
  - proc_param
  parameterAlarm:
  - alarms_realtime
  tc:
  - name: tc_realtime
    processor: realtime
  tm:
  - name: tm_realtime
    processor: realtime
  - name: tm_dump
